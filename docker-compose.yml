version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: weather-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: weather-dashboard
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - weather-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: weather-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/weather-dashboard
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: 7d
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - weather-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: weather-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - weather-net

volumes:
  mongodb_data:

networks:
  weather-net:
    driver: bridge
